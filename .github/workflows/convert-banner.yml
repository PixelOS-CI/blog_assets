name: Convert Banner to WebP

on:
  push:
    paths:
      - 'banner.png'
      - '**/*.png'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert PNG to WebP
        run: python3 .github/scripts/convert_to_webp.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Add any generated .webp files
          find . -type f -iname '*.webp' -not -path './.*/*' -print0 | xargs -0 --no-run-if-empty git add || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "assets: convert PNGs to WebP"
            git push
          fi
